<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Liceo Labriola – Display</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --blu: #0a1628;
    --blu2: #112244;
    --gold: #c8a84b;
    --white: #f0f4ff;
    --gray: #8899bb;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--blu);
    color: var(--white);
    font-family: 'Lato', sans-serif;
    width: 100vw; height: 100vh;
    overflow: hidden;
    display: flex; flex-direction: column;
  }

  /* HEADER */
  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 18px 40px 14px;
    border-bottom: 2px solid var(--gold);
    background: var(--blu2);
    flex-shrink: 0;
  }
  .logo-area { display: flex; align-items: center; gap: 16px; }
  .logo-circle {
    width: 52px; height: 52px; border-radius: 50%;
    border: 2px solid var(--gold);
    background: var(--blu);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px; color: var(--gold); letter-spacing: 1px;
  }
  .school-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px; letter-spacing: 3px; color: var(--white);
    line-height: 1;
  }
  .school-sub { font-size: 11px; color: var(--gray); letter-spacing: 2px; text-transform: uppercase; }
  #clock {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 42px; color: var(--gold); letter-spacing: 2px;
  }
  #date-display {
    text-align: right; font-size: 12px; color: var(--gray);
    letter-spacing: 1px; text-transform: uppercase;
  }

  /* SLIDE AREA */
  #slide-container {
    flex: 1;
    position: relative;
    overflow: hidden;
  }

  .slide {
    position: absolute; inset: 0;
    display: flex;
    opacity: 0;
    transition: opacity 0.8s ease;
    pointer-events: none;
  }
  .slide.active { opacity: 1; pointer-events: auto; }

  /* Slide tipo: testo */
  .slide-text {
    flex-direction: column;
    align-items: center; justify-content: center;
    text-align: center;
    padding: 40px 80px;
    background: var(--blu);
  }
  .slide-text .tag {
    font-size: 12px; letter-spacing: 4px; text-transform: uppercase;
    color: var(--gold); margin-bottom: 20px;
  }
  .slide-text h2 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(48px, 7vw, 96px);
    line-height: 1; color: var(--white);
    margin-bottom: 24px;
  }
  .slide-text p {
    font-size: clamp(16px, 2vw, 24px);
    color: var(--gray); max-width: 700px; line-height: 1.6;
  }

  /* Slide tipo: immagine + testo */
  .slide-image {
    flex-direction: row;
  }
  .slide-image .img-half {
    flex: 1;
    background-size: cover; background-position: center;
    position: relative;
  }
  .slide-image .img-half::after {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(to right, transparent 60%, var(--blu));
  }
  .slide-image .text-half {
    flex: 1;
    display: flex; flex-direction: column;
    justify-content: center;
    padding: 40px 60px 40px 40px;
    background: var(--blu);
  }
  .slide-image .text-half .tag {
    font-size: 12px; letter-spacing: 4px; text-transform: uppercase;
    color: var(--gold); margin-bottom: 16px;
  }
  .slide-image .text-half h2 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(36px, 5vw, 72px);
    line-height: 1.1; color: var(--white); margin-bottom: 18px;
  }
  .slide-image .text-half p {
    font-size: clamp(14px, 1.6vw, 20px);
    color: var(--gray); line-height: 1.6;
  }

  /* Slide tipo: video YouTube */
  .slide-video {
    align-items: center; justify-content: center;
    background: #000;
  }
  .slide-video iframe {
    width: 100%; height: 100%; border: none;
  }

  /* PROGRESS BAR */
  #progress-bar {
    height: 3px; background: var(--blu2); flex-shrink: 0;
  }
  #progress-fill {
    height: 100%; background: var(--gold);
    width: 0%; transition: width linear;
  }

  /* TICKER */
  #ticker-bar {
    background: var(--gold);
    color: var(--blu);
    font-size: 15px; font-weight: 700;
    letter-spacing: 1px;
    padding: 8px 0;
    overflow: hidden;
    flex-shrink: 0;
    display: flex; align-items: center;
  }
  #ticker-label {
    background: var(--blu);
    color: var(--gold);
    padding: 0 20px;
    font-size: 11px; letter-spacing: 3px;
    text-transform: uppercase;
    white-space: nowrap;
    flex-shrink: 0;
  }
  #ticker-track {
    display: flex; white-space: nowrap;
    animation: ticker-scroll 30s linear infinite;
  }
  #ticker-track span { padding: 0 60px; }
  @keyframes ticker-scroll {
    from { transform: translateX(0); }
    to   { transform: translateX(-50%); }
  }

  /* DOTS */
  #dots {
    position: absolute; bottom: 20px; left: 50%;
    transform: translateX(-50%);
    display: flex; gap: 10px; z-index: 10;
  }
  .dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--gray); transition: background 0.3s;
  }
  .dot.active { background: var(--gold); }

  /* Decorazione angolo */
  .corner-deco {
    position: absolute; bottom: 0; right: 0;
    width: 200px; height: 200px;
    border-top: 2px solid rgba(200,168,75,0.15);
    border-left: 2px solid rgba(200,168,75,0.15);
    pointer-events: none;
  }

  #no-content {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    height: 100%; color: var(--gray);
    font-family: 'Bebas Neue', sans-serif;
    font-size: 32px; letter-spacing: 4px;
  }
</style>
</head>
<body>

<header>
  <div class="logo-area">
    <div class="logo-circle">LL</div>
    <div>
      <div class="school-name">Liceo Labriola</div>
      <div class="school-sub">Roma · Informazioni & Comunicazioni</div>
    </div>
  </div>
  <div>
    <div id="clock">00:00:00</div>
    <div id="date-display">—</div>
  </div>
</header>

<div id="progress-bar"><div id="progress-fill"></div></div>

<div id="slide-container">
  <div id="no-content">Nessun contenuto disponibile</div>
  <div id="dots"></div>
  <div class="corner-deco"></div>
</div>

<div id="ticker-bar">
  <div id="ticker-label">📢 Comunicazioni</div>
  <div id="ticker-track"><span id="ticker-text">—</span><span id="ticker-text2">—</span></div>
</div>

<!-- Firebase -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDNDrCcZ8O9xdSgMDxjZscG2q2MQ-8ShRw",
    authDomain: "displayer-2b20c.firebaseapp.com",
    databaseURL: "https://displayer-2b20c-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "displayer-2b20c",
    storageBucket: "displayer-2b20c.firebasestorage.app",
    messagingSenderId: "406579948319",
    appId: "1:406579948319:web:910abf919d89c7c4d99e2a"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  // ——— OROLOGIO ———
  function updateClock() {
    const now = new Date();
    document.getElementById('clock').textContent =
      now.toLocaleTimeString('it-IT');
    document.getElementById('date-display').textContent =
      now.toLocaleDateString('it-IT', { weekday:'long', day:'numeric', month:'long', year:'numeric' });
  }
  updateClock();
  setInterval(updateClock, 1000);

  // ——— SLIDE ENGINE ———
  let slides = [];
  let currentIndex = 0;
  let slideTimer = null;
  let progressTimer = null;

  function buildSlide(data) {
    const div = document.createElement('div');
    div.className = 'slide';

    if (data.type === 'video' && data.youtubeId) {
      div.classList.add('slide-video');
      div.innerHTML = `<iframe src="https://www.youtube.com/embed/${data.youtubeId}?autoplay=1&mute=1&loop=1&playlist=${data.youtubeId}&controls=0" allowfullscreen></iframe>`;

    } else if (data.type === 'image' && data.imageUrl) {
      div.classList.add('slide-image');
      div.innerHTML = `
        <div class="img-half" style="background-image:url('${data.imageUrl}')"></div>
        <div class="text-half">
          <div class="tag">${data.tag || 'Comunicazione'}</div>
          <h2>${data.title || ''}</h2>
          <p>${data.body || ''}</p>
        </div>`;

    } else {
      div.classList.add('slide-text');
      div.innerHTML = `
        <div class="tag">${data.tag || 'Comunicazione'}</div>
        <h2>${data.title || ''}</h2>
        <p>${data.body || ''}</p>`;
    }
    return div;
  }

  function showSlide(index) {
    const container = document.getElementById('slide-container');
    const allSlides = container.querySelectorAll('.slide');
    allSlides.forEach((s, i) => s.classList.toggle('active', i === index));

    const dots = document.querySelectorAll('.dot');
    dots.forEach((d, i) => d.classList.toggle('active', i === index));

    // progress bar
    const dur = (slides[index]?.duration || 8) * 1000;
    const fill = document.getElementById('progress-fill');
    fill.style.transition = 'none'; fill.style.width = '0%';
    requestAnimationFrame(() => {
      fill.style.transition = `width ${dur}ms linear`;
      fill.style.width = '100%';
    });
  }

  function startCarousel() {
    clearInterval(slideTimer);
    if (slides.length === 0) return;

    showSlide(currentIndex);

    slideTimer = setInterval(() => {
      currentIndex = (currentIndex + 1) % slides.length;
      showSlide(currentIndex);
    }, (slides[currentIndex]?.duration || 8) * 1000);
  }

  function renderSlides(dataArray) {
    const container = document.getElementById('slide-container');
    // rimuovi slide vecchie
    container.querySelectorAll('.slide').forEach(s => s.remove());
    document.getElementById('dots').innerHTML = '';
    document.getElementById('no-content').style.display =
      dataArray.length === 0 ? 'flex' : 'none';

    slides = dataArray;
    currentIndex = 0;

    slides.forEach((s, i) => {
      container.insertBefore(buildSlide(s), document.getElementById('dots'));
      const dot = document.createElement('div');
      dot.className = 'dot';
      document.getElementById('dots').appendChild(dot);
    });

    startCarousel();
  }

  // ——— TICKER ———
  function setTicker(text) {
    if (!text) text = '—';
    document.getElementById('ticker-text').textContent = text;
    document.getElementById('ticker-text2').textContent = text;
  }

  // ——— FIREBASE LISTENER ———
  onValue(ref(db, 'signage/slides'), snap => {
    const val = snap.val();
    const arr = val ? Object.values(val).filter(s => s.active !== false) : [];
    renderSlides(arr);
  });

  onValue(ref(db, 'signage/ticker'), snap => {
    setTicker(snap.val() || '—');
  });

  // ——— AUTO REFRESH ogni 5 min ———
  setTimeout(() => location.reload(), 5 * 60 * 1000);
</script>
</body>
</html>
