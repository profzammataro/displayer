<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Liceo Labriola – Display</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --blu: #0a1628;
    --blu2: #112244;
    --gold: #c8a84b;
    --white: #f0f4ff;
    --gray: #8899bb;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--blu);
    color: var(--white);
    font-family: 'Lato', sans-serif;
    width: 100vw; height: 100vh;
    overflow: hidden;
    display: flex; flex-direction: column;
  }

  /* ── HEADER ── */
  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 20px;
    border-bottom: 2px solid var(--gold);
    background: var(--blu2);
    flex-shrink: 0;
    gap: 12px;
  }
  .logo-area { display: flex; align-items: center; gap: 12px; min-width: 0; }

  .school-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(16px, 3vw, 28px);
    letter-spacing: 2px; color: var(--white); line-height: 1;
  }
  .school-sub {
    font-size: clamp(8px, 1.2vw, 11px); color: var(--gray);
    letter-spacing: 1px; text-transform: uppercase;
  }
  .clock-area { text-align: right; flex-shrink: 0; }
  #clock {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(24px, 5vw, 42px);
    color: var(--gold); letter-spacing: 2px; line-height: 1;
  }
  #date-display {
    font-size: clamp(8px, 1.2vw, 12px); color: var(--gray);
    letter-spacing: 1px; text-transform: uppercase;
  }

  /* ── SLIDE CONTAINER ── */
  #slide-container {
    flex: 1;
    position: relative;
    overflow: hidden;
    min-height: 0;
  }

  .slide {
    position: absolute; inset: 0;
    opacity: 0;
    transition: opacity 0.8s ease;
    pointer-events: none;
    display: flex;
  }
  .slide.active { opacity: 1; pointer-events: auto; }

  /* ── SLIDE: SOLO TESTO ── */
  .slide-text {
    flex-direction: column;
    align-items: center; justify-content: center;
    text-align: center;
    padding: clamp(20px, 4vw, 60px) clamp(20px, 8vw, 100px);
    background: var(--blu);
  }
  .slide-text .tag {
    font-size: clamp(10px, 1.2vw, 13px);
    letter-spacing: 4px; text-transform: uppercase;
    color: var(--gold); margin-bottom: clamp(12px, 2vh, 24px);
  }
  .slide-text h2 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(32px, 7vw, 96px);
    line-height: 1; color: var(--white);
    margin-bottom: clamp(12px, 2vh, 24px);
  }
  .slide-text p {
    font-size: clamp(14px, 2vw, 24px);
    color: var(--gray); max-width: 700px; line-height: 1.6;
  }

  /* ── SLIDE: IMMAGINE + TESTO (landscape) ── */
  .slide-image {
    flex-direction: row;
  }
  .slide-image .img-half {
    flex: 0 0 62%;
    background-size: contain;
    background-position: center;
    background-repeat: no-repeat;
    position: relative;
    min-width: 0;
  }
  .slide-image .img-half::after {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(to right, transparent 72%, var(--blu) 100%);
  }
  .slide-image .text-half {
    flex: 1;
    display: flex; flex-direction: column;
    justify-content: center;
    padding: clamp(16px, 2.5vw, 40px) clamp(16px, 3.5vw, 52px);
    background: var(--blu);
    min-width: 0;
    overflow: hidden;
  }
  .slide-image .text-half .tag {
    font-size: clamp(9px, 1vw, 12px);
    letter-spacing: 4px; text-transform: uppercase;
    color: var(--gold); margin-bottom: clamp(8px, 1.5vh, 18px);
  }
  .slide-image .text-half h2 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(28px, 4.5vw, 72px);
    line-height: 1.05; color: var(--white);
    margin-bottom: clamp(8px, 1.5vh, 18px);
    word-break: break-word;
  }
  .slide-image .text-half p {
    font-size: clamp(13px, 1.6vw, 22px);
    color: var(--gray); line-height: 1.6;
    overflow: hidden;
  }

  /* ── PORTRAIT / MOBILE: immagine sopra, testo sotto ── */
  @media (max-aspect-ratio: 1/1) {
    .slide-image {
      flex-direction: column;
    }
    .slide-image .img-half {
      flex: 0 0 45%;
      width: 100%;
    }
    .slide-image .img-half::after {
      /* gradiente verso il basso invece che verso destra */
      background: linear-gradient(to bottom, transparent 40%, var(--blu));
    }
    .slide-image .text-half {
      flex: 1;
      padding: 16px 24px 8px;
      justify-content: flex-start;
      overflow-y: auto;
    }
    .slide-image .text-half h2 {
      font-size: clamp(24px, 6vw, 52px);
    }
    .slide-image .text-half p {
      font-size: clamp(13px, 3.5vw, 20px);
    }
    /* testo solo */
    .slide-text {
      padding: 24px;
    }
    .slide-text h2 { font-size: clamp(28px, 8vw, 60px); }
    .slide-text p  { font-size: clamp(14px, 4vw, 22px); }
    /* orologio compatto */
    .school-sub { display: none; }
    #date-display { display: none; }
  }

  /* ── SLIDE: VIDEO ── */
  .slide-video {
    align-items: center; justify-content: center;
    background: #000;
  }
  .slide-video iframe {
    width: 100%; height: 100%; border: none;
  }

  /* ── PROGRESS BAR ── */
  #progress-bar { height: 3px; background: var(--blu2); flex-shrink: 0; }
  #progress-fill { height: 100%; background: var(--gold); width: 0%; transition: width linear; }

  /* ── TICKER ── */
  #ticker-bar {
    background: var(--gold); color: var(--blu);
    font-size: clamp(12px, 1.8vw, 16px); font-weight: 700;
    letter-spacing: 1px; padding: 6px 0;
    overflow: hidden; flex-shrink: 0;
    display: flex; align-items: center;
  }
  #ticker-label {
    background: var(--blu); color: var(--gold);
    padding: 0 14px;
    font-size: clamp(9px, 1vw, 11px); letter-spacing: 2px;
    text-transform: uppercase; white-space: nowrap; flex-shrink: 0;
  }
  #ticker-track {
    display: flex; white-space: nowrap;
    animation: ticker-scroll 30s linear infinite;
  }
  #ticker-track span { padding: 0 50px; }
  @keyframes ticker-scroll {
    from { transform: translateX(0); }
    to   { transform: translateX(-50%); }
  }

  /* ── DOTS ── */
  #dots {
    position: absolute; bottom: 12px; left: 50%;
    transform: translateX(-50%);
    display: flex; gap: 8px; z-index: 10;
  }
  .dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--gray); transition: background 0.3s;
  }
  .dot.active { background: var(--gold); }

  .corner-deco {
    position: absolute; bottom: 0; right: 0;
    width: 150px; height: 150px;
    border-top: 2px solid rgba(200,168,75,0.12);
    border-left: 2px solid rgba(200,168,75,0.12);
    pointer-events: none;
  }

  #no-content {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    height: 100%; color: var(--gray);
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(18px, 4vw, 32px); letter-spacing: 4px;
  }
</style>
</head>
<body>

<header>
  <div class="logo-area">
    <img src="logo_labriola.jpg" alt="Liceo Labriola" style="height:44px;width:44px;object-fit:contain;border-radius:4px;flex-shrink:0;">
    <div>
      <div class="school-name">Liceo Labriola</div>
      <div class="school-sub">Roma · Informazioni & Comunicazioni</div>
    </div>
  </div>
  <div class="clock-area">
    <div id="clock">00:00:00</div>
    <div id="date-display">—</div>
  </div>
</header>

<div id="progress-bar"><div id="progress-fill"></div></div>

<div id="slide-container">
  <div id="no-content">Nessun contenuto disponibile</div>
  <div id="dots"></div>
  <div class="corner-deco"></div>
</div>

<div id="ticker-bar">
  <div id="ticker-label">📢 Comunicazioni</div>
  <div id="ticker-track">
    <span id="ticker-text">—</span>
    <span id="ticker-text2">—</span>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDNDrCcZ8O9xdSgMDxjZscG2q2MQ-8ShRw",
    authDomain: "displayer-2b20c.firebaseapp.com",
    databaseURL: "https://displayer-2b20c-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "displayer-2b20c",
    storageBucket: "displayer-2b20c.firebasestorage.app",
    messagingSenderId: "406579948319",
    appId: "1:406579948319:web:910abf919d89c7c4d99e2a"
  };

  const app = initializeApp(firebaseConfig);
  const db  = getDatabase(app);

  // OROLOGIO
  function updateClock() {
    const now = new Date();
    document.getElementById('clock').textContent = now.toLocaleTimeString('it-IT');
    document.getElementById('date-display').textContent =
      now.toLocaleDateString('it-IT', { weekday:'long', day:'numeric', month:'long', year:'numeric' });
  }
  updateClock();
  setInterval(updateClock, 1000);

  // SLIDE ENGINE
  let slides = [], currentIndex = 0, slideTimer = null;

  function buildSlide(data) {
    const div = document.createElement('div');
    div.className = 'slide';

    if (data.type === 'video' && data.youtubeId) {
      div.classList.add('slide-video');
      div.innerHTML = `<iframe src="https://www.youtube.com/embed/${data.youtubeId}?autoplay=1&mute=1&loop=1&playlist=${data.youtubeId}&controls=0" allowfullscreen></iframe>`;

    } else if (data.type === 'image' && data.imageUrl) {
      div.classList.add('slide-image');
      div.innerHTML = `
        <div class="img-half" style="background-image:url('${data.imageUrl}')"></div>
        <div class="text-half">
          <div class="tag">${data.tag || 'Comunicazione'}</div>
          <h2>${data.title || ''}</h2>
          <p>${data.body || ''}</p>
        </div>`;

    } else {
      div.classList.add('slide-text');
      div.innerHTML = `
        <div class="tag">${data.tag || 'Comunicazione'}</div>
        <h2>${data.title || ''}</h2>
        <p>${data.body || ''}</p>`;
    }
    return div;
  }

  function showSlide(index) {
    document.querySelectorAll('#slide-container .slide')
      .forEach((s, i) => s.classList.toggle('active', i === index));
    document.querySelectorAll('.dot')
      .forEach((d, i) => d.classList.toggle('active', i === index));

    const dur = (slides[index]?.duration || 8) * 1000;
    const fill = document.getElementById('progress-fill');
    fill.style.transition = 'none'; fill.style.width = '0%';
    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        fill.style.transition = `width ${dur}ms linear`;
        fill.style.width = '100%';
      });
    });
  }

  function startCarousel() {
    clearInterval(slideTimer);
    if (!slides.length) return;
    showSlide(currentIndex);
    slideTimer = setInterval(() => {
      currentIndex = (currentIndex + 1) % slides.length;
      showSlide(currentIndex);
    }, (slides[currentIndex]?.duration || 8) * 1000);
  }

  function renderSlides(arr) {
    const container = document.getElementById('slide-container');
    container.querySelectorAll('.slide').forEach(s => s.remove());
    document.getElementById('dots').innerHTML = '';
    document.getElementById('no-content').style.display = arr.length ? 'none' : 'flex';

    slides = arr; currentIndex = 0;
    const dotsEl = document.getElementById('dots');
    slides.forEach(s => {
      container.insertBefore(buildSlide(s), dotsEl);
      const dot = document.createElement('div');
      dot.className = 'dot';
      dotsEl.appendChild(dot);
    });
    startCarousel();
  }

  // TICKER
  function setTicker(text) {
    const t = text || '—';
    document.getElementById('ticker-text').textContent = t;
    document.getElementById('ticker-text2').textContent = t;
  }

  // FIREBASE
  onValue(ref(db, 'signage/slides'), snap => {
    const val = snap.val();
    renderSlides(val ? Object.values(val).filter(s => s.active !== false) : []);
  });
  onValue(ref(db, 'signage/ticker'), snap => setTicker(snap.val()));

  // AUTO REFRESH 5 min
  setTimeout(() => location.reload(), 5 * 60 * 1000);
</script>
</body>
</html>
